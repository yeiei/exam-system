<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ form.workType ? form.workType + '题库' : '在线答题系统' }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; }
    #app { max-width: 900px; margin: 0 auto; padding: 12px; }

    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; border-radius: 10px; margin-bottom: 12px; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .header .user-info { display: flex; justify-content: space-between; align-items: center; }
    .header .btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

    .card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { color: #333; margin-bottom: 12px; font-size: 16px; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; color: #666; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }

    .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .btn-secondary { padding: 8px 14px; background: #f5f7fa; color: #666; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 6px; }
    .btn-small { padding: 6px 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }

    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input { flex: 1; }
    .search-box button { white-space: nowrap; }

    .question-item { padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; }
    .question-item .q-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
    .question-item .q-num { color: #667eea; font-weight: 600; }
    .question-item .q-type { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: #666; }
    .question-item .q-content { font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 10px; }

    .options { display: flex; flex-direction: column; gap: 6px; }
    .option { display: flex; align-items: center; padding: 8px 10px; border: 1px solid #eee; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .option:hover { border-color: #667eea; background: #f8f9ff; }
    .option.selected { border-color: #667eea; background: #e8eeff; }
    .option.correct { border-color: #67c23a; background: #f0f9eb; }
    .option.wrong { border-color: #f56c6c; background: #fef0f0; }
    .option .letter { min-width: 22px; height: 22px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 8px; font-size: 12px; }

    .answer-box { margin-top: 12px; padding: 10px; border-radius: 6px; background: #f0f9eb; border: 1px solid #67c23a; }
    .answer-box.wrong { background: #fef0f0; border-color: #f56c6c; }
    .answer-box span { color: #67c23a; font-weight: 600; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-wrap: wrap; gap: 8px; }
    .nav-bar .info { color: #666; font-size: 13px; }
    .nav-bar .btns { display: flex; gap: 6px; }
    .nav-bar .btns button:disabled { opacity: 0.5; cursor: not-allowed; }

    .no-result { text-align: center; padding: 40px 20px; color: #999; }
    .loading { text-align: center; padding: 20px; color: #999; }

    /* 模式选择卡片 */
    .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .mode-card { padding: 20px 15px; border: 2px solid #eee; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .mode-card:hover { border-color: #667eea; transform: translateY(-2px); }
    .mode-card.active { border-color: #667eea; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .mode-card .icon { font-size: 32px; margin-bottom: 8px; }
    .mode-card .title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .mode-card .desc { font-size: 12px; opacity: 0.8; }

    /* 考试/练习/背题 答题页面 */
    .exam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .exam-header .timer { font-size: 18px; font-weight: 600; color: #667eea; }
    .exam-header .timer.warning { color: #e6a23c; }
    .exam-header .timer.danger { color: #f56c6c; }
    .exam-progress { color: #666; font-size: 13px; }

    /* 答题结果 */
    .result-card { text-align: center; padding: 30px 20px; }
    .result-card .score { font-size: 48px; font-weight: 700; color: #667eea; margin-bottom: 10px; }
    .result-card .score.excellent { color: #67c23a; }
    .result-card .score.good { color: #667eea; }
    .result-card .score.pass { color: #e6a23c; }
    .result-card .score.fail { color: #f56c6c; }
    .result-card .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
    .result-card .stat-item { text-align: center; }
    .result-card .stat-num { font-size: 24px; font-weight: 600; color: #333; }
    .result-card .stat-label { font-size: 12px; color: #999; }
    .result-card .correct-num { color: #67c23a; }
    .result-card .wrong-num { color: #f56c6c; }

    /* 背题模式 */
    .review-card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .review-card .q-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
    .review-card .q-num { color: #667eea; font-weight: 600; }
    .review-card .q-type { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: #666; }
    .review-card .q-content { font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 10px; }
    .review-card .options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .review-card .option { display: flex; align-items: center; padding: 8px 10px; border: 1px solid #eee; border-radius: 6px; font-size: 13px; }
    .review-card .option .letter { min-width: 22px; height: 22px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 8px; font-size: 12px; }
    /* 背题模式：正确选项标绿 */
    .review-card .option.correct { border-color: #67c23a; background: #f0f9eb; }
    .review-card .option.correct .letter { background: #67c23a; color: white; }
    .review-toggle { width: 100%; padding: 12px; background: #67c23a; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

    /* 开始页面 */
    .start-card { text-align: center; padding: 30px 20px; }
    .start-card .title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 10px; }
    .start-card .desc { color: #666; margin-bottom: 20px; font-size: 14px; }
    .start-card .count { font-size: 48px; font-weight: 700; color: #667eea; margin: 20px 0; }
    .start-card .tips { color: #999; font-size: 12px; margin-bottom: 20px; }

    /* 练习模式反馈 */
    .feedback { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px; border-radius: 6px; }
    .feedback.correct { background: #f0f9eb; border: 1px solid #67c23a; }
    .feedback.wrong { background: #fef0f0; border: 1px solid #f56c6c; }
    .feedback-icon { font-size: 20px; }
    .feedback-text { font-size: 14px; }
    .feedback.correct .feedback-text { color: #67c23a; }
    .feedback.wrong .feedback-text { color: #f56c6c; }

    /* 题号网格 */
    .question-grid { display: grid; grid-template-columns: repeat(25, 1fr); gap: 6px; margin-top: 12px; }
    .question-grid .q-num { 
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; 
      border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s; 
      background: #f0f0f0; color: #666; border: 1px solid #ddd;
    }
    .question-grid .q-num:hover { border-color: #667eea; }
    .question-grid .q-num.current { background: #667eea; color: white; border-color: #667eea; }
    .question-grid .q-num.answered { background: #67c23a; color: white; border-color: #67c23a; }
    .question-grid .q-num.wrong { background: #f56c6c; color: white; border-color: #f56c6c; }

    @media (max-width: 480px) {
      #app { padding: 8px; }
      .header { padding: 12px; border-radius: 8px; }
      .header h1 { font-size: 18px; }
      .card { padding: 10px; border-radius: 8px; }
      .search-box { flex-direction: column; }
      .mode-grid { grid-template-columns: 1fr; }
      .result-card .stats { gap: 15px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录页面 -->
    <template v-if="!user.loggedIn">
      <div class="header">
        <h1>🎯 {{ form.workType ? form.workType + '题库' : '在线答题系统' }}</h1>
        <p style="opacity: 0.8; font-size: 14px;">安全作业知识在线练习系统 (共 {{ totalQuestions || '?' }} 题)</p>
      </div>

      <div class="card">
        <h2>{{ isRegister ? '用户注册' : '用户登录' }}</h2>
        <form @submit.prevent="submitForm">
          <div class="form-group">
            <label>用户名</label>
            <input v-model="form.username" placeholder="请输入用户名" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input v-model="form.password" type="password" placeholder="请输入密码" required>
          </div>
          <div class="form-group" v-if="!isRegister">
            <label>选择题库 ({{ questionBanks.length }}个)</label>
            <select v-model="form.workType" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white;">
              <option value="">请选择题库</option>
              <option v-for="bank in questionBanks" :key="bank.id" :value="bank.work_type">
                {{ bank.name }} ({{ bank.question_count }}题)
              </option>
            </select>
          </div>
          <button type="submit" class="btn-primary">
            {{ isRegister ? '注册' : '登录' }}
          </button>
        </form>
        <p style="text-align: center; margin-top: 15px; color: #999;">
          {{ isRegister ? '已有账号？' : '没有账号？' }}
          <a href="#" @click.prevent="isRegister = !isRegister" style="color: #667eea;">{{ isRegister ? '去登录' : '去注册' }}</a>
        </p>
      </div>
    </template>

    <!-- 登录后的主页面 -->
    <template v-else>
      <div class="header">
        <div class="user-info">
          <div>
            <h1>🎯 {{ user.workType || '在线答题系统' }}</h1>
            <p style="opacity: 0.8; font-size: 14px;">
              <span v-if="user.workType" style="background: #67c23a; padding: 2px 8px; border-radius: 4px; margin-right: 8px;">{{ user.workType }}</span>
              共 {{ totalQuestions || '?' }} 题 · {{ user.username }}
            </p>
          </div>
          <button class="btn" @click="logout">退出</button>
        </div>
      </div>

      <!-- 模式选择（查题模式不显示这个，其他模式显示） -->
      <template v-if="currentMode && currentMode !== 'search'">
        <!-- 开始页面 -->
        <template v-if="!examStarted">
          <div class="card start-card">
            <div class="title">{{ getModeTitle() }}</div>
            <div class="desc">{{ getModeDesc() }}</div>
            <div class="count">{{ totalQuestions }}</div>
            <div class="tips" v-if="currentMode === 'exam'">考试时长：{{ totalQuestions * 30 / 60 }} 分钟</div>
            <button class="btn-primary" @click="startExam">开始{{ getModeBtnText() }}</button>
          </div>
        </template>

        <!-- 答题页面 -->
        <template v-else>
          <div class="card">
            <!-- 考试模式头部 -->
            <div class="exam-header" v-if="currentMode === 'exam'">
              <div class="exam-progress">已答 {{ answeredCount }} / {{ examQuestions.length }} 题</div>
              <div style="display: flex; align-items: center; gap: 12px;">
                <div class="timer" :class="{ warning: timer <= 300, danger: timer <= 60 }">
                  🕐 {{ formatTime(timer) }}
                </div>
                <button class="btn-small" style="background: #f56c6c;" @click="endExam">返回</button>
              </div>
            </div>
            <!-- 练习/背题模式头部 -->
            <div class="exam-header" v-if="currentMode === 'practice' || currentMode === 'review'">
              <div class="exam-progress">当前第 {{ currentIndex + 1 }} / {{ examQuestions.length }} 题</div>
              <button class="btn-small" @click="endExam">返回</button>
            </div>

            <!-- 练习/背题模式：上一题/下一题按钮移到题目上方 -->
            <div class="nav-bar" v-if="currentMode === 'practice' || currentMode === 'review'" style="margin-bottom: 16px; margin-top: 0;">
              <button class="btn-secondary" @click="prevQuestion" :disabled="currentIndex <= 0">← 上一题</button>
              <span style="color: #666; font-size: 13px;">{{ currentIndex + 1 }} / {{ examQuestions.length }}</span>
              <button class="btn-small" @click="nextQuestion" v-if="currentIndex < examQuestions.length - 1">下一题 →</button>
              <button class="btn-primary" style="width: auto; padding: 8px 20px;" @click="currentMode === 'review' ? endExam : submitExam" v-else>{{ currentMode === 'review' ? '完成背题' : '交卷' }}</button>
            </div>

            <!-- 答题进度条 -->
            <div style="height: 4px; background: #eee; border-radius: 2px; margin-bottom: 16px; overflow: hidden;">
              <div :style="{ width: (answeredCount / examQuestions.length * 100) + '%', height: '100%', background: '#667eea', transition: 'width 0.3s' }"></div>
            </div>

            <!-- 当前题目 -->
            <div class="question-item" v-if="examQuestions[currentIndex]">
              <div class="q-header">
                <span class="q-num">第 {{ currentIndex + 1 }} 题</span>
                <span class="q-type">{{ examQuestions[currentIndex].question_type }}</span>
              </div>
              <div class="q-content">{{ examQuestions[currentIndex].content }}</div>
              
              <div class="options">
                <div 
                  v-for="opt in getOptions(examQuestions[currentIndex])" 
                  :key="opt.letter" 
                  class="option"
                  :class="{ 
                    selected: currentMode === 'practice' && isSelected(opt.letter),
                    correct: (currentMode === 'practice' && showAnswer && isCorrectAnswer(opt.letter)) || (currentMode === 'review' && opt.letter.toUpperCase() === examQuestions[currentIndex].answer.toUpperCase()),
                    wrong: currentMode === 'practice' && showAnswer && isSelected(opt.letter) && !isCorrectAnswer(opt.letter)
                  }"
                  @click="currentMode === 'practice' && selectOption(opt.letter)"
                >
                  <span class="letter">{{ opt.letter }}</span>
                  <span>{{ opt.text }}</span>
                </div>
              </div>

              <!-- 练习模式：立即显示答案 -->
              <template v-if="currentMode === 'practice' && showAnswer">
                <div class="feedback" :class="practiceResult.correct ? 'correct' : 'wrong'">
                  <span class="feedback-icon">{{ practiceResult.correct ? '✅' : '❌' }}</span>
                  <span class="feedback-text">{{ practiceResult.correct ? '回答正确' : '回答错误，正确答案是 ' + examQuestions[currentIndex].answer }}</span>
                </div>
                <button class="btn-primary" style="margin-top: 12px;" @click="nextQuestion">
                  {{ currentIndex < examQuestions.length - 1 ? '下一题' : '查看结果' }}
                </button>
              </template>

              <!-- 背题模式：直接在选项中显示正确答案（选项已标绿） -->
              <template v-if="currentMode === 'review'">
                <div class="answer-box" style="margin-top: 12px; display: none;">
                  <span>正确答案：{{ examQuestions[currentIndex].answer }}</span>
                </div>
              </template>
            </div>
          </div>

          <!-- 练习模式题号网格 -->
          <div class="card" v-if="currentMode === 'practice'">
            <div style="font-size: 13px; color: #666; margin-bottom: 8px;">题目标记：<span style="display: inline-block; width: 12px; height: 12px; background: #667eea; border-radius: 2px; vertical-align: middle;"></span> 当前题 &nbsp; <span style="display: inline-block; width: 12px; height: 12px; background: #67c23a; border-radius: 2px; vertical-align: middle;"></span> 已答对 &nbsp; <span style="display: inline-block; width: 12px; height: 12px; background: #f56c6c; border-radius: 2px; vertical-align: middle;"></span> 已答错</div>
            <div class="question-grid">
              <div 
                v-for="(q, idx) in examQuestions" 
                :key="q.id"
                class="q-num"
                :class="{ 
                  current: idx === currentIndex,
                  answered: userAnswers[q.id] && (userAnswers[q.id].toUpperCase() === q.answer.toUpperCase()),
                  wrong: userAnswers[q.id] && (userAnswers[q.id].toUpperCase() !== q.answer.toUpperCase())
                }"
                @click="currentIndex = idx; showAnswer = false"
              >
                {{ idx + 1 }}
              </div>
            </div>
          </div>

          <!-- 背题模式题号网格 -->
          <div class="card" v-if="currentMode === 'review'">
            <div style="font-size: 13px; color: #666; margin-bottom: 8px;">点击题号可跳转</div>
            <div class="question-grid">
              <div 
                v-for="(q, idx) in examQuestions" 
                :key="q.id"
                class="q-num"
                :class="{ current: idx === currentIndex }"
                @click="currentIndex = idx"
              >
                {{ idx + 1 }}
              </div>
            </div>
          </div>

          <!-- 底部导航（仅考试模式） -->
          <div class="card" v-if="currentMode === 'exam'">
            <div class="nav-bar">
              <button class="btn-secondary" @click="prevQuestion" :disabled="currentIndex <= 0">← 上一题</button>
              <span style="color: #666; font-size: 13px;">{{ currentIndex + 1 }} / {{ examQuestions.length }}</span>
              <button class="btn-small" @click="nextQuestion" v-if="currentIndex < examQuestions.length - 1">下一题 →</button>
              <button class="btn-primary" style="width: auto; padding: 8px 20px;" @click="currentMode === 'review' ? endExam : submitExam" v-else>{{ currentMode === 'review' ? '完成背题' : '交卷' }}</button>
            </div>
          </div>
        </template>
      </template>

      <!-- 考试结果 -->
      <template v-if="examResult && !currentMode">
        <div class="card result-card">
          <div class="score" :class="getScoreClass()">{{ examResult.score }}分</div>
          <div style="color: #666; margin-bottom: 20px;">{{ getScoreMessage() }}</div>
          <div class="stats">
            <div class="stat-item">
              <div class="stat-num correct-num">{{ examResult.correctCount }}</div>
              <div class="stat-label">正确</div>
            </div>
            <div class="stat-item">
              <div class="stat-num wrong-num">{{ examResult.wrongCount }}</div>
              <div class="stat-label">错误</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">{{ examResult.total }}</div>
              <div class="stat-label">总题数</div>
            </div>
          </div>
          <button class="btn-primary" @click="backToModeSelect">返回</button>
        </div>
      </template>

      <!-- 模式选择 -->
      <template v-if="!currentMode && !examResult">
        <div class="card">
          <h2>选择学习模式</h2>
          <div class="mode-grid">
            <div class="mode-card" @click="selectMode('exam')">
              <div class="icon">📝</div>
              <div class="title">考试模式</div>
              <div class="desc">限时作答，检验学习成果</div>
            </div>
            <div class="mode-card" @click="selectMode('practice')">
              <div class="icon">✏️</div>
              <div class="title">练习模式</div>
              <div class="desc">即时反馈，加深记忆</div>
            </div>
            <div class="mode-card" @click="selectMode('review')">
              <div class="icon">📚</div>
              <div class="title">背题模式</div>
              <div class="desc">查看答案，巩固知识点</div>
            </div>
            <div class="mode-card" @click="selectMode('search')">
              <div class="icon">🔍</div>
              <div class="title">查题</div>
              <div class="desc">搜索题目，查看解析</div>
            </div>
          </div>
        </div>
      </template>

      <!-- 查题页面 -->
      <template v-if="currentMode === 'search'">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h2 style="margin: 0;">🔍 查题</h2>
            <button class="btn-secondary" @click="endExam">返回</button>
          </div>
          
          <div class="search-box">
            <input v-model="searchKeyword" placeholder="输入题目关键词搜索..." @keyup.enter="searchQuestions">
            <button @click="searchQuestions" class="btn-small">搜索</button>
            <button v-if="searchKeyword" @click="clearSearch" class="btn-secondary">清空</button>
          </div>

          <!-- 加载状态 -->
          <div v-if="loading" class="loading">
            加载中...
          </div>

          <!-- 搜索/列表结果 -->
          <div v-else>
            <div style="margin-bottom: 12px; font-size: 13px; color: #666;">
              共 {{ total }} 道题目，当前显示 {{ questions.length }} 道
            </div>
            
            <div v-if="questions.length === 0" class="no-result">
              {{ searchKeyword ? '未找到匹配的题目' : '暂无题目数据' }}
            </div>

            <div v-else>
              <div v-for="(q, idx) in questions" :key="q.id" class="question-item">
                <div class="q-header">
                  <span class="q-num">第 {{ (page - 1) * pageSize + idx + 1 }} 题</span>
                  <span class="q-type">{{ q.question_type }}</span>
                </div>
                <div class="q-content">{{ q.content }}</div>
                
                <div class="options">
                  <div v-for="opt in getOptions(q)" :key="opt.letter" class="option">
                    <span class="letter">{{ opt.letter }}</span>
                    <span>{{ opt.text }}</span>
                  </div>
                </div>

                <div class="answer-box">
                  <span>正确答案：{{ q.answer }}</span>
                </div>
              </div>

              <!-- 分页控件 -->
              <div class="nav-bar">
                <div class="info">第 {{ page }} / {{ totalPages }} 页</div>
                <div class="btns">
                  <button class="btn-small" @click="page--; loadQuestions()" :disabled="page <= 1">上一页</button>
                  <button class="btn-small" @click="page++; loadQuestions()" :disabled="page >= totalPages">下一页</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.8/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, reactive, computed } = Vue;

    createApp({
      setup() {
        const user = reactive({ loggedIn: false, username: '', workType: '' });
        const isRegister = ref(false);
        const form = reactive({ username: '', password: '', workType: '' });
        const questionBanks = ref([
          { id: '电工', name: '电工', work_type: '电工', question_count: 272 },
          { id: '高处安装维护', name: '高处安装维护', work_type: '高处安装维护', question_count: 268 }
        ]);

        // 模式相关状态
        const currentMode = ref(''); // exam, practice, review, search
        const examStarted = ref(false);
        const examQuestions = ref([]);
        const currentIndex = ref(0);
        const userAnswers = reactive({}); // 用户答案
        const timer = ref(0); // 考试计时器
        const timerInterval = ref(null);
        const showAnswer = ref(false); // 练习模式显示答案
        const practiceResult = reactive({ correct: false }); // 练习结果
        const examResult = ref(null); // 考试结果
        const revealedAnswers = reactive({}); // 背题模式答案显示状态

        // 加载题库列表
        async function loadQuestionBanks() {
          try {
            const res = await fetch('/api/question-banks');
            const data = await res.json();
            if (data.success && data.banks) {
              questionBanks.value = [...data.banks];
            }
          } catch (e) {
            console.error('加载题库失败:', e);
          }
        }
        loadQuestionBanks();

        // 题目相关状态（查题模式用）
        const questions = ref([]);
        const loading = ref(false);
        const searchKeyword = ref('');
        const page = ref(1);
        const pageSize = ref(20);
        const total = ref(0);

        // 计算总页数
        const totalPages = computed(() => {
          return Math.ceil(total.value / pageSize.value) || 1;
        });

        // 计算当前题库的题目数量
        const totalQuestions = computed(() => {
          const workType = user.workType || form.workType;
          if (!workType) return 0;
          const bank = questionBanks.value.find(b => b.work_type === workType);
          return bank ? bank.question_count : 0;
        });

        // 已答题数
        const answeredCount = computed(() => {
          return Object.keys(userAnswers).filter(k => userAnswers[k]).length;
        });

        // 加载题目列表（查题模式）
        async function loadQuestions() {
          loading.value = true;
          try {
            const workType = user.workType || form.workType;
            const params = new URLSearchParams({
              page: page.value,
              pageSize: pageSize.value,
              keyword: searchKeyword.value.trim()
            });
            // 添加 workType 参数筛选题库
            if (workType) {
              params.append('workType', workType);
            }
            const res = await fetch('/api/all-questions?' + params, { credentials: 'same-origin' });
            const data = await res.json();
            
            if (data.success) {
              questions.value = data.data || [];
              total.value = data.pagination?.total || 0;
            } else {
              questions.value = [];
              total.value = 0;
            }
          } catch (e) {
            console.error('加载题目失败:', e);
            questions.value = [];
          }
          loading.value = false;
        }

        // 搜索题目
        function searchQuestions() {
          page.value = 1;
          loadQuestions();
        }

        // 清空搜索
        function clearSearch() {
          searchKeyword.value = '';
          page.value = 1;
          loadQuestions();
        }

        // 获取选项
        function getOptions(q) {
          const opts = [];
          if (q.option_a) opts.push({ letter: 'A', text: q.option_a });
          if (q.option_b) opts.push({ letter: 'B', text: q.option_b });
          if (q.option_c) opts.push({ letter: 'C', text: q.option_c });
          if (q.option_d) opts.push({ letter: 'D', text: q.option_d });
          if (q.option_e) opts.push({ letter: 'E', text: q.option_e });
          return opts;
        }

        // 选择模式 - 选择后直接进入答题页面
        async function selectMode(mode) {
          currentMode.value = mode;
          if (mode === 'search') {
            loadQuestions();
          } else {
            // 先设置已开始，避免显示开始页面
            examStarted.value = true;
            // 直接开始答题，不需要点击开始按钮
            await startExam();
          }
        }

        // 获取模式标题
        function getModeTitle() {
          const titles = {
            exam: '考试模式',
            practice: '练习模式',
            review: '背题模式'
          };
          return titles[currentMode.value] || '';
        }

        // 获取模式描述
        function getModeDesc() {
          const descs = {
            exam: '模拟真实考试，限时作答',
            practice: '答题后立即显示对错，加深印象',
            review: '查看所有题目及答案，背诵记忆'
          };
          return descs[currentMode.value] || '';
        }

        // 获取模式按钮文字
        function getModeBtnText() {
          const texts = {
            exam: '开始考试',
            practice: '开始练习',
            review: '开始背题'
          };
          return texts[currentMode.value] || '开始';
        }

        // 开始考试/练习/背题
        async function startExam() {
          const workType = user.workType || form.workType;
          
          // 练习/背题模式：获取全部题目
          // 考试模式：限制题目数量（电工/高处安装维护：50题）
          let questionCount = 50; // 默认
          if (currentMode.value === 'practice' || currentMode.value === 'review') {
            // 练习/背题模式：获取全部题目，设置一个足够大的数量
            questionCount = 999; 
          } else if (workType === '电工' || workType === '高处安装维护') {
            questionCount = 50; // 考试模式：单选题30 + 判断题20
          }
          
          try {
            const params = new URLSearchParams({
              count: questionCount,
              mode: currentMode.value
            });
            if (workType) {
              params.append('workType', workType);
            }
            const res = await fetch(`/api/questions?${params}`, {
              credentials: 'same-origin'
            });
            const data = await res.json();
            
            if (data.success) {
              examQuestions.value = data.questions || [];
              examStarted.value = true;
              currentIndex.value = 0;
              
              // 清空之前的状态
              Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
              showAnswer.value = false;
              
              // 背题模式：默认显示所有答案
              if (currentMode.value === 'review') {
                Object.keys(revealedAnswers).forEach(k => delete revealedAnswers[k]);
                examQuestions.value.forEach(q => {
                  revealedAnswers[q.id] = true;
                });
              }
              
              // 考试模式启动计时器
              if (currentMode.value === 'exam') {
                timer.value = examQuestions.value.length * 30;
                startTimer();
              }
            } else {
              alert(data.message || '加载题目失败');
              examStarted.value = false; // 失败时重置
              currentMode.value = ''; // 返回模式选择
            }
          } catch (e) {
            console.error('加载题目失败:', e);
            alert('加载题目失败');
            examStarted.value = false; // 失败时重置
            currentMode.value = ''; // 返回模式选择
          }
        }

        // 启动计时器
        function startTimer() {
          if (timerInterval.value) clearInterval(timerInterval.value);
          timerInterval.value = setInterval(() => {
            timer.value--;
            if (timer.value <= 0) {
              clearInterval(timerInterval.value);
              submitExam();
            }
          }, 1000);
        }

        // 格式化时间
        function formatTime(seconds) {
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 选择答案
        function selectOption(letter) {
          const q = examQuestions.value[currentIndex.value];
          if (!q) return;

          // 练习模式：点击后立即显示答案
          if (currentMode.value === 'practice') {
            userAnswers[q.id] = letter;
            showAnswer.value = true;
            
            // 判断对错
            const correct = letter.toUpperCase() === q.answer.toUpperCase();
            practiceResult.correct = correct;
            return;
          }

          // 考试模式：直接切换选择
          if (currentMode.value === 'exam') {
            userAnswers[q.id] = letter;
          }
        }

        // 检查是否已选择
        function isSelected(letter) {
          const q = examQuestions.value[currentIndex.value];
          if (!q) return false;
          return userAnswers[q.id] === letter;
        }

        // 检查是否为正确答案
        function isCorrectAnswer(letter) {
          const q = examQuestions.value[currentIndex.value];
          if (!q) return false;
          return letter.toUpperCase() === q.answer.toUpperCase();
        }

        // 上一题
        function prevQuestion() {
          if (currentIndex.value > 0) {
            currentIndex.value--;
            showAnswer.value = false;
          }
        }

        // 下一题
        function nextQuestion() {
          if (currentMode.value === 'practice') {
            showAnswer.value = false;
          }
          
          if (currentIndex.value < examQuestions.value.length - 1) {
            currentIndex.value++;
          }
        }

        // 交卷
        async function submitExam() {
          if (timerInterval.value) {
            clearInterval(timerInterval.value);
          }

          const answers = {};
          examQuestions.value.forEach(q => {
            if (userAnswers[q.id]) {
              answers[q.id] = userAnswers[q.id];
            }
          });

          try {
            const res = await fetch('/api/submit', {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ 
                answers,
                examMode: currentMode.value === 'exam'
              })
            });
            const data = await res.json();
            
            if (data.success) {
              examResult.value = {
                correctCount: data.correctCount,
                wrongCount: data.wrongCount,
                score: data.score,
                total: data.total
              };
            } else {
              alert(data.message || '提交失败');
            }
          } catch (e) {
            console.error('提交失败:', e);
            alert('提交失败');
          }
        }

        // 结束考试
        function endExam() {
          if (timerInterval.value) {
            clearInterval(timerInterval.value);
          }
          examStarted.value = false;
          currentIndex.value = 0;
          examQuestions.value = [];
          Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
          showAnswer.value = false;
          examResult.value = null; // 清除考试结果，返回模式选择页面
          currentMode.value = '';
        }

        // 返回模式选择
        function backToModeSelect() {
          examResult.value = null;
          currentMode.value = '';
          endExam();
        }

        // 获取成绩样式
        function getScoreClass() {
          if (!examResult.value) return '';
          const score = examResult.value.score;
          if (score >= 90) return 'excellent';
          if (score >= 80) return 'good';
          if (score >= 60) return 'pass';
          return 'fail';
        }

        // 获取成绩消息
        function getScoreMessage() {
          if (!examResult.value) return '';
          const score = examResult.value.score;
          if (score >= 90) return '太棒了！优秀！';
          if (score >= 80) return '不错！良好！';
          if (score >= 60) return '及格了，继续加油！';
          return '再接再厉，多练习！';
        }

        // 背题模式：切换答案显示
        function toggleAnswer(qId) {
          revealedAnswers[qId] = !revealedAnswers[qId];
        }

        checkLogin();

        // 检查登录状态
        async function checkLogin() {
          const savedWorkType = localStorage.getItem('work_type');
          
          const res = await fetch('/api/me', { credentials: 'include' });
          const data = await res.json();
          if (data.loggedIn) {
            user.loggedIn = true;
            user.username = data.username;
            user.workType = data.workType || savedWorkType || '';
          }
        }

        async function submitForm() {
          const url = isRegister.value ? '/api/register' : '/api/login';
          const res = await fetch(url, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          const data = await res.json();

          if (data.success) {
            if (isRegister.value) {
              alert('注册成功，请登录');
              isRegister.value = false;
            } else {
              user.loggedIn = true;
              user.username = data.username;
              user.workType = data.workType || form.workType;
              
              localStorage.setItem('auth_token', '1');
              localStorage.setItem('work_type', user.workType);
              localStorage.setItem('username', user.username);
            }
          } else {
            alert(data.message);
          }
        }

        async function logout() {
          await fetch('/api/logout', { method: 'POST', credentials: 'include' });
          user.loggedIn = false;
          user.username = '';
          currentMode.value = '';
          examStarted.value = false;
          examResult.value = null;
          localStorage.removeItem('auth_token');
          localStorage.removeItem('work_type');
          localStorage.removeItem('username');
        }

        return {
          user, isRegister, form, questionBanks, totalQuestions,
          questions, loading, searchKeyword, page, pageSize, total, totalPages,
          searchQuestions, clearSearch, getOptions,
          submitForm, logout,
          // 模式相关
          currentMode, examStarted, examQuestions, currentIndex, userAnswers,
          timer, showAnswer, practiceResult, examResult, answeredCount, revealedAnswers,
          selectMode, startExam, selectOption, isSelected, isCorrectAnswer,
          prevQuestion, nextQuestion, submitExam, endExam, backToModeSelect,
          formatTime, getModeTitle, getModeDesc, getModeBtnText,
          getScoreClass, getScoreMessage, toggleAnswer
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
