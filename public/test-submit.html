<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试提交</title>
</head>
<body>
  <h1>测试答案提交</h1>
  <button onclick="testSubmit()">测试提交</button>
  <pre id="result"></pre>
  <script>
    async function testSubmit() {
      // 先登录
      const loginRes = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({username: 'ye', password: '123456'})
      });
      const loginData = await loginRes.json();
      document.getElementById('result').textContent = '登录: ' + JSON.stringify(loginData);
      
      // 获取题目
      const qRes = await fetch('/api/questions?mode=practice&count=3', {credentials: 'include'});
      const qData = await qRes.json();
      
      // 构造答案 - 使用数字ID作为key
      const answers = {};
      for (const q of qData.questions) {
        answers[q.id] = [q.answer];  // 数字ID，数组值
      }
      
      document.getElementById('result').textContent += '\n题目: ' + JSON.stringify(qData.questions.map(q => ({id: q.id, answer: q.answer})));
      document.getElementById('result').textContent += '\n提交答案: ' + JSON.stringify(answers);
      document.getElementById('result').textContent += '\n答案key类型: ' + Object.keys(answers).map(k => typeof k);
      
      // 提交
      const submitRes = await fetch('/api/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({answers})
      });
      const submitData = await submitRes.json();
      document.getElementById('result').textContent += '\n结果: ' + JSON.stringify(submitData);
    }
  </script>
</body>
</html>
